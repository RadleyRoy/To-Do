name: taskley
description: "Taskley — an offline-first to-do app with checklists, smart recurring tasks, alarms, and a calendar view."
publish_to: 'none'
version: 1.1.0+6

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  drift: ^2.34.2
  drift_flutter: ^0.3.1
  path_provider: ^2.1.6
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  table_calendar: ^3.2.0
  file_picker: 10.0.0
  icalendar_parser: ^2.1.0
  intl: ^0.20.3
  home_widget: ^0.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.4
  build_runner: ^2.15.1
  flutter_launcher_icons: 0.14.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/taskley-mark-1024.png"
  adaptive_icon_background: "#FCFCFC"
  adaptive_icon_foreground: "assets/icon/taskley-mark-1024.png"
  # Keep the check inside the adaptive-icon safe zone.
  adaptive_icon_foreground_inset: 20
  min_sdk_android: 33
