org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# Must stay false until every plugin we depend on supports AGP 9's built-in
# Kotlin. flutter_local_notifications still applies the Kotlin Gradle Plugin
# unconditionally, and flipping this to true fails its configuration. This is
# also why file_picker is held at 10.x — 11.x requires built-in Kotlin.
android.builtInKotlin=false
# Kotlin incremental compilation breaks when the pub cache (C:) and the
# project (D:) are on different drives ("files have different roots").
kotlin.incremental=false
