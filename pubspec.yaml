name: taskley
description: "Taskley — an offline-first to-do app with checklists, smart recurring tasks, alarms, and a calendar view."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  drift: ^2.34.2
  drift_flutter: ^0.3.1
  path_provider: ^2.1.6
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  table_calendar: ^3.2.0
  file_picker: 11.0.2
  share_plus: ">=12.0.0 <13.1.0"
  icalendar_parser: ^2.1.0
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.4
  build_runner: ^2.15.1

flutter:
  uses-material-design: true
